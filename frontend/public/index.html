<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF → Markdown</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>PDF → Markdown</h1>
    <p>Upload a PDF and download a <code>.zip</code> containing the Markdown file and all extracted images.</p>

    <div id="drop-zone">
      <!-- multiple allows selecting several PDFs at once in the file picker -->
      
      <input type="file" id="file-input" accept=".pdf" multiple hidden />
      <label for="file-input">
        <span id="drop-label">Drop PDFs here, or click to browse</span>
      </label>
    </div>

    <!-- Populated by app.js: one <li> per selected PDF showing name + status -->
    <ul id="file-list"></ul>

    <!-- Disabled until at least one PDF is selected -->
    <button id="convert-btn" disabled>Convert All</button>
    <p id="status"></p>
  </main>
  <script src="app.js"></script>
</body>
</html>
